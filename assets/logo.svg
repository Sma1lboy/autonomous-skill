<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0f23;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a1a3e;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="loop" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#a78bfa;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#22d3ee;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#6366f1;stop-opacity:0.8" />
    </linearGradient>
  </defs>

  <!-- Background circle -->
  <circle cx="200" cy="200" r="190" fill="url(#bg)" />
  <circle cx="200" cy="200" r="190" fill="none" stroke="url(#loop)" stroke-width="3" opacity="0.5" />

  <!-- Infinity loop (the autonomous loop concept) -->
  <g transform="translate(200, 185)" fill="none" stroke="url(#loop)" stroke-width="8" stroke-linecap="round">
    <!-- Left loop -->
    <path d="M -15,0 C -15,-35 -65,-35 -65,0 C -65,35 -15,35 -15,0" />
    <!-- Right loop -->
    <path d="M 15,0 C 15,35 65,35 65,0 C 65,-35 15,-35 15,0" />
  </g>

  <!-- Code brackets inside the loops -->
  <g fill="none" stroke="url(#glow)" stroke-width="5" stroke-linecap="round" stroke-linejoin="round">
    <!-- Left bracket { -->
    <path d="M 118,165 L 108,175 L 108,182 L 103,187 L 108,192 L 108,199 L 118,209" />
    <!-- Right bracket } -->
    <path d="M 282,165 L 292,175 L 292,182 L 297,187 L 292,192 L 292,199 L 282,209" />
  </g>

  <!-- Small dots orbiting (representing iterations) -->
  <circle cx="200" cy="130" r="5" fill="#22d3ee" opacity="0.9">
    <animateTransform attributeName="transform" type="rotate" from="0 200 187" to="360 200 187" dur="4s" repeatCount="indefinite"/>
  </circle>
  <circle cx="200" cy="244" r="4" fill="#a78bfa" opacity="0.7">
    <animateTransform attributeName="transform" type="rotate" from="180 200 187" to="540 200 187" dur="4s" repeatCount="indefinite"/>
  </circle>
  <circle cx="135" cy="187" r="3" fill="#6366f1" opacity="0.5">
    <animateTransform attributeName="transform" type="rotate" from="90 200 187" to="450 200 187" dur="6s" repeatCount="indefinite"/>
  </circle>

  <!-- Moon (sleeping concept) -->
  <g transform="translate(305, 105)">
    <circle cx="0" cy="0" r="22" fill="#fbbf24" opacity="0.9"/>
    <circle cx="8" cy="-5" r="18" fill="url(#bg)"/>
  </g>

  <!-- Stars -->
  <circle cx="90" cy="90" r="2" fill="#fff" opacity="0.7"/>
  <circle cx="120" cy="70" r="1.5" fill="#fff" opacity="0.5"/>
  <circle cx="320" cy="80" r="2" fill="#fff" opacity="0.6"/>
  <circle cx="75" cy="120" r="1" fill="#fff" opacity="0.4"/>
  <circle cx="330" cy="120" r="1.5" fill="#fff" opacity="0.5"/>

  <!-- Text -->
  <text x="200" y="270" text-anchor="middle" fill="#e2e8f0" font-family="SF Mono, Monaco, Consolas, monospace" font-size="18" font-weight="600" letter-spacing="2">
    autonomous
  </text>
  <text x="200" y="295" text-anchor="middle" fill="#a78bfa" font-family="SF Mono, Monaco, Consolas, monospace" font-size="14" letter-spacing="4">
    skill
  </text>

  <!-- Tagline -->
  <text x="200" y="335" text-anchor="middle" fill="#64748b" font-family="-apple-system, sans-serif" font-size="11" letter-spacing="1">
    sleep well, ship more
  </text>
</svg>
