<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <linearGradient id="bg3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fafafa;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f4f4f5;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="loop3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#18181b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3f3f46;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="pulse3" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#8b5cf6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#06b6d4;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="400" height="400" rx="32" fill="url(#bg3)" />

  <!-- Continuous loop — the autonomous cycle -->
  <!-- Thick stylized infinity/möbius loop -->
  <g transform="translate(200, 165)">
    <path d="M 0,-8 C 40,-8 55,-50 75,-50 C 95,-50 95,-8 75,8 C 55,24 40,50 75,50 C 95,50 95,8 75,-8"
          fill="none" stroke="url(#loop3)" stroke-width="6" stroke-linecap="round" transform="scale(1.1)"/>
    <path d="M 0,8 C -40,8 -55,50 -75,50 C -95,50 -95,8 -75,-8 C -55,-24 -40,-50 -75,-50 C -95,-50 -95,-8 -75,8"
          fill="none" stroke="url(#loop3)" stroke-width="6" stroke-linecap="round" transform="scale(1.1)"/>
  </g>

  <!-- Active pulse dot traveling the loop -->
  <circle r="6" fill="url(#pulse3)">
    <animateMotion dur="4s" repeatCount="indefinite" path="M 200,157 C 244,157 261,115 283,115 C 305,115 305,157 283,175 C 261,193 244,220 283,220 C 305,220 305,175 283,157 M 200,175 C 156,175 139,220 117,220 C 95,220 95,175 117,157 C 139,139 156,115 117,115 C 95,115 95,157 117,175"/>
  </circle>

  <!-- Three small marks — the 3 layers -->
  <circle cx="200" cy="165" r="3" fill="#18181b"/>
  <circle cx="158" cy="190" r="2.5" fill="#3f3f46" opacity="0.7"/>
  <circle cx="242" cy="140" r="2.5" fill="#3f3f46" opacity="0.7"/>

  <!-- Text -->
  <text x="200" y="278" text-anchor="middle" fill="#18181b" font-family="Inter, -apple-system, sans-serif" font-size="28" font-weight="700" letter-spacing="-0.5">
    autonomous
  </text>
  <text x="200" y="306" text-anchor="middle" fill="#a1a1aa" font-family="SF Mono, Monaco, Consolas, monospace" font-size="14" font-weight="400" letter-spacing="3">
    SKILL
  </text>

  <!-- Tagline -->
  <text x="200" y="350" text-anchor="middle" fill="#a1a1aa" font-family="Inter, -apple-system, sans-serif" font-size="11" letter-spacing="2">
    it just keeps going
  </text>
</svg>
